{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card overflow-hidden">
            <div class="p-4 border-bottom border-secondary text-center">
                <h2 class="h4 mb-0 fw-bold"><i class="bi bi-pencil-square me-2 text-warning"></i> แก้ไขข้อมูลประชากร</h2>
            </div>
            <div class="p-5">
                <form method="post" action="/edit/{{person.id}}/">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="name" class="form-label text-muted small text-uppercase fw-bold">ชื่อ-นามสกุล</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-muted">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" class="form-control bg-transparent border-secondary text-white py-3" 
                                   id="name" name="name" value="{{person.name}}" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="age" class="form-label text-muted small text-uppercase fw-bold">อายุ (ปี)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-secondary text-muted">
                                <i class="bi bi-calendar2-event"></i>
                            </span>
                            <input type="number" class="form-control bg-transparent border-secondary text-white py-3" 
                                   id="age" name="age" value="{{person.age}}" required>
                        </div>
                    </div>
                    <div class="d-grid gap-3 pt-3">
                        <button type="submit" class="btn btn-premium py-3">
                            <i class="bi bi-check2-circle me-2"></i> บันทึกการแก้ไข
                        </button>
                        <a href="/" class="btn btn-outline-premium py-3">
                            <i class="bi bi-arrow-left me-2"></i> ยกเลิก
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
