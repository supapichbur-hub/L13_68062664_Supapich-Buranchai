{% extends "base.html" %}

{% block content %}
<div style="background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200') center/cover; padding: 40px; border-radius: 8px; margin-bottom: 20px;">
    <h2 class="text-white text-center fw-bold" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.8);">ยินดีต้อนรับสู่เว็บไซต์ของรายวิชา ICT12367</h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header text-center text-white fw-bold" style="background-color: #0d6efd;">
                แบบฟอร์มบันทึกข้อมูลประชากร
            </div>
            <div class="card-body">
                <form method="post" action="/form/">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">ชื่อประชากร</label>
                        <input type="text" class="form-control" name="name" placeholder="กรุณากรอกชื่อ-นามสกุล">
                    </div>
                    <div class="mb-3">
                        <label for="age" class="form-label">อายุ</label>
                        <input type="number" class="form-control" name="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">ลงทะเบียน</button>
                        <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
